<title>LIF</title>
<style>
@font-face{font-family:'Graphik';src:url('fonts/Graphik-Extralight.otf') format('opentype');font-weight:200;font-style:normal;font-display:swap;}
@font-face{font-family:'Graphik';src:url('fonts/Graphik-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Graphik';src:url('fonts/Graphik-Semibold.otf') format('opentype');font-weight:600;font-style:normal;font-display:swap;}
@font-face{font-family:'Graphik';src:url('fonts/Graphik-Bold.otf') format('opentype');font-weight:800;font-style:normal;font-display:swap;}
@font-face{font-family:'Apercu';src:url('fonts/Apercu-Light.otf') format('opentype');font-weight:300;font-style:normal;font-display:swap;}
@font-face{font-family:'Apercu';src:url('fonts/Apercu-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Apercu';src:url('fonts/Apercu-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'RomanaBT';src:url('fonts/RomanaBT-Roman.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'RomanaBT';src:url('fonts/RomanaBT-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap;}

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sh:#F9EFE5;--shell-50:#FCF7EF;--warm:#E8DED4;
  --ink:#2F2B2B;--ink-200:#E8DED4;--ink-500:#9E9692;
  --palm:#0C7A4B;--blue:#3D6B9E;--pop:#C8001E;--sol:#FFAC00;
  --font-display:'Graphik',-apple-system,sans-serif;
  --font-ui:'Apercu',-apple-system,sans-serif;
  --font-serif:'RomanaBT',Georgia,serif;
  --tracking-cap:.18em;
}
html,body{width:100%;height:100%;background:var(--sh);overflow:hidden;font-family:var(--font-display);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
/* Paper grain overlay on shell scenes */
.stage.bg-sh::after,.stage.bg-warm::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:5;opacity:.05;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");}
.stage{position:fixed;inset:0;}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(24px,4.5vw,64px);opacity:0;pointer-events:none;transition:opacity 0.65s;}
.scene.on{opacity:1;}
.ibg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 22%;}
.ov1{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,18,18,.15),rgba(20,18,18,.72));}
.ov2{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,18,18,.58) 0%,rgba(20,18,18,.22) 50%,rgba(20,18,18,.68) 100%);}
.z{position:relative;z-index:2;}
/* progress bar removed — manual viewing */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:center;padding:0 0 22px;gap:14px;}
.nb{background:none;border:1px solid currentColor;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:15px;padding:0;transition:all .25s ease;line-height:1;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);}
.nb.lt{color:rgba(47,43,43,.35);border-color:rgba(47,43,43,.18);}
.nb.dk{color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.18);}
.nb.lt:hover{color:rgba(47,43,43,.95);border-color:rgba(47,43,43,.55);background:rgba(47,43,43,.04);}
.nb.dk:hover{color:rgba(255,255,255,.95);border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);}
.ctr{font-family:var(--font-ui);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;min-width:64px;text-align:center;transition:color .2s;}
.ctr.lt{color:rgba(47,43,43,.45);}
.ctr.dk{color:rgba(255,255,255,.5);}
.hero{font-family:var(--font-display);font-size:clamp(40px,7.5vw,108px);font-weight:800;line-height:.94;letter-spacing:-.035em;text-align:center;text-wrap:balance;}
.big{font-family:var(--font-display);font-size:clamp(28px,5.5vw,78px);font-weight:800;line-height:.96;letter-spacing:-.028em;text-align:center;text-wrap:balance;}
.mid{font-family:var(--font-display);font-size:clamp(20px,3.8vw,52px);font-weight:200;line-height:1.08;letter-spacing:-.015em;text-align:center;text-wrap:balance;}
.body{font-family:var(--font-display);font-size:clamp(14px,1.85vw,20px);font-weight:300;line-height:1.6;text-align:center;max-width:580px;text-wrap:balance;}
.sm{font-family:var(--font-ui);font-size:clamp(12px,1.55vw,16px);font-weight:300;line-height:1.6;text-align:center;max-width:540px;text-wrap:balance;}
.cap{font-family:var(--font-ui);font-size:clamp(10px,1.05vw,12px);font-weight:500;letter-spacing:var(--tracking-cap);text-transform:uppercase;}
.it{font-family:var(--font-serif);font-style:italic;font-weight:400;letter-spacing:0;}
.serif{font-family:var(--font-serif);font-style:italic;font-weight:400;letter-spacing:0;}
.sp{display:block;height:clamp(10px,2vw,26px);}
.ss{display:block;height:clamp(5px,1vw,12px);}
.rule{width:36px;height:1.5px;background:currentColor;opacity:.2;margin:20px auto;}
.num{font-family:var(--font-display);font-size:clamp(50px,8vw,118px);font-weight:800;line-height:.84;letter-spacing:-.04em;}
.sh{color:var(--sh);}
.ink{color:var(--ink);}
.wh{color:#fff;}
.dw{color:rgba(255,255,255,.35);}
.di{color:rgba(47,43,43,.38);}
.bg-sh{background:var(--sh);}
.bg-ink{background:var(--ink);}
.bg-palm{background:var(--palm);}
.bg-blue{background:var(--blue);}
.bg-pop{background:var(--pop);}
.bg-warm{background:var(--warm);}
@keyframes up{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes sc{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
@keyframes fd{from{opacity:0;}to{opacity:1;}}
.a1{animation:up .9s cubic-bezier(.16,1,.3,1) .1s both;}
.a2{animation:up .9s cubic-bezier(.16,1,.3,1) .32s both;}
.a3{animation:up .9s cubic-bezier(.16,1,.3,1) .58s both;}
.a4{animation:up .9s cubic-bezier(.16,1,.3,1) .86s both;}
.a5{animation:up .9s cubic-bezier(.16,1,.3,1) 1.18s both;}
.a6{animation:up .9s cubic-bezier(.16,1,.3,1) 1.5s both;}
.afd{animation:fd .9s ease .15s both;}
.asc{animation:sc 1s cubic-bezier(.16,1,.3,1) .2s both;}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(620px,90vw);}
.mc{background:rgba(47,43,43,.07);border-radius:2px;padding:clamp(10px,1.6vw,16px) clamp(12px,2vw,18px);}
.ml{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(47,43,43,.4);margin-bottom:4px;}
.mv{font-size:clamp(22px,3.8vw,44px);font-weight:800;letter-spacing:-.03em;color:var(--ink);line-height:1;}
.ms{font-size:10px;font-weight:300;color:rgba(47,43,43,.45);margin-top:3px;line-height:1.4;}
.prow{display:flex;gap:clamp(12px,3vw,44px);justify-content:center;flex-wrap:wrap;align-items:flex-end;}
.ph{width:clamp(232px,22.5vw,296px);background:linear-gradient(155deg,#1f1f1f 0%,#0d0d0d 100%);border-radius:clamp(36px,4.6vw,48px);padding:clamp(7px,1vw,10px);box-shadow:0 28px 70px rgba(0,0,0,.28),0 0 0 1px rgba(0,0,0,.06),inset 0 0 0 1.5px rgba(255,255,255,.05);}
.ph-screen{background:#fff;border-radius:clamp(30px,3.8vw,40px);overflow:hidden;position:relative;display:flex;flex-direction:column;}
.ph-island{position:absolute;top:clamp(10px,1.3vw,13px);left:50%;transform:translateX(-50%);width:clamp(82px,9.4vw,104px);height:clamp(22px,2.5vw,28px);background:#0a0a0a;border-radius:99px;z-index:3;}
.ph-bar{position:absolute;top:clamp(14px,1.7vw,18px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 clamp(20px,2.5vw,26px);z-index:2;font-family:var(--font-ui);font-size:clamp(10px,1.05vw,11.5px);font-weight:600;color:#1a1a1a;letter-spacing:-.01em;line-height:1;pointer-events:none;}
.ph-bar-r{display:flex;align-items:center;gap:5px;}
.ph-bar-r svg{display:block;}
.ph-content{padding:clamp(48px,5.8vw,60px) clamp(14px,1.8vw,18px) clamp(14px,1.8vw,18px);display:flex;flex-direction:column;}
.ph-h{font-family:var(--font-ui);font-size:clamp(9px,.95vw,10px);font-weight:600;color:#C17A4A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;}
.ph-t{font-family:var(--font-display);font-size:clamp(15px,1.85vw,18px);font-weight:700;color:#1a1a1a;line-height:1.18;margin-bottom:3px;letter-spacing:-.018em;}
.ph-s{font-family:var(--font-ui);font-size:clamp(8px,.85vw,9.5px);color:rgba(26,26,26,.5);margin-bottom:9px;font-weight:400;}
.ph-net{width:100%;height:clamp(160px,18vw,220px);background:#F5EFE6;border-radius:10px;overflow:hidden;}
.ph-sig{font-family:var(--font-ui);font-size:clamp(7.5px,.82vw,9px);color:rgba(26,26,26,.42);margin-top:7px;line-height:1.5;font-weight:400;letter-spacing:.02em;}
.ph-btn{background:#1a1a1a;color:#fff;border-radius:99px;text-align:center;font-family:var(--font-ui);font-size:clamp(11px,1.2vw,12.5px);font-weight:600;padding:clamp(11px,1.4vw,13px);margin-top:10px;letter-spacing:.02em;}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:min(510px,88vw);}
.pc{background:rgba(47,43,43,.05);border-radius:2px;padding:12px 15px;}
#nc{position:absolute;inset:0;opacity:0;transition:opacity 1.4s;pointer-events:none;z-index:1;}
#rb{position:fixed;bottom:16px;right:20px;z-index:950;background:none;border:none;cursor:pointer;font-family:var(--font-ui);font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.22);opacity:0;pointer-events:none;transition:opacity .4s,color .2s;}
#rb.on{opacity:1;pointer-events:auto;}
#rb:hover{color:rgba(255,255,255,.55);}

.br{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
.bn{position:absolute;width:28px;height:28px;border-radius:50%;overflow:visible;transform:translate(-50%,-50%) scale(0);display:flex;align-items:center;justify-content:center;transition:transform .55s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;}
.bn.vis{transform:translate(-50%,-50%) scale(1);opacity:1;}
.bn-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.15);}
.bn-init{font-size:9px;font-weight:700;color:rgba(255,255,255,.9);font-family:var(--font-ui);}
.bn-label{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;font-size:8px;font-weight:600;color:rgba(47,43,43,.55);white-space:nowrap;font-family:var(--font-ui);}
.bp{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--bcol);opacity:0;animation:bpulse 3s ease-in-out infinite;}
.bn.vis .bp{opacity:.45;}
@keyframes bpulse{0%,100%{transform:scale(1);opacity:.45;}50%{transform:scale(1.5);opacity:0;}}
.pr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(47,43,43,.06);animation:prpulse 7s ease-in-out infinite;}
@keyframes prpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6;}50%{transform:translate(-50%,-50%) scale(1.05);opacity:.2;}}

</style>

</template>

// Network canvas (LN)
var nc=document.createElement('canvas');
nc.id='nc';nc.style.cssText='position:absolute;inset:0;opacity:0;transition:opacity 1.4s;pointer-events:none;z-index:1;';
var LN={nodes:[],edges:[],active:false,raf:null,
  COLS:['#C8001E','#F9EFE5','#4A7EC7','#0C7A4B','#FFAC00'],
  c:function(h,a){var r=parseInt(h.slice(1,3),16)||0,g=parseInt(h.slice(3,5),16)||0,b=parseInt(h.slice(5,7),16)||0;return'rgba('+r+','+g+','+b+','+a+')';},
  init:function(){var cv=nc,ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;this.nodes=[];this.edges=[];var self=this;
    function add(){if(!self.active)return;var n={x:Math.random()*cv.width,y:Math.random()*cv.height,r:0,max:3+Math.random()*9,col:self.COLS[Math.floor(Math.random()*5)]};
      if(self.nodes.length>0){var sorted=[].concat(self.nodes).sort(function(a,b){return Math.hypot(a.x-n.x,a.y-n.y)-Math.hypot(b.x-n.x,b.y-n.y);});
        sorted.slice(0,Math.ceil(Math.random()*2)).forEach(function(nb){self.edges.push({a:n,b:nb,p:0,col:n.col});});}
      self.nodes.push(n);if(self.nodes.length<80)setTimeout(add,100+Math.random()*200);}
    setTimeout(add,400);
    var last=null;
    function loop(ts){if(!self.active)return;if(!last)last=ts;var dt=Math.min((ts-last)/1000,.05);last=ts;
      ctx.fillStyle='rgba(47,43,43,.22)';ctx.fillRect(0,0,cv.width,cv.height);
      self.edges.forEach(function(e){e.p=Math.min(1,e.p+dt*.012);ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.a.x+(e.b.x-e.a.x)*e.p,e.a.y+(e.b.y-e.a.y)*e.p);ctx.strokeStyle=self.c(e.col,.13);ctx.lineWidth=.7;ctx.stroke();});
      self.nodes.forEach(function(n){n.r=Math.min(n.max,n.r+.28);ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=self.c(n.col,.65);ctx.fill();});
      var el=document.getElementById('lnCnt');if(el)el.textContent=(3847+self.nodes.length).toLocaleString();
      self.raf=requestAnimationFrame(loop);}
    this.raf=requestAnimationFrame(loop);},
  stop:function(){this.active=false;if(this.raf)cancelAnimationFrame(this.raf);}
};

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<scenes.length-1)go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0)go(cur-1);}
});
rb.addEventListener('click',function(e){e.stopPropagation();rb.className='';go(0);});
go(0);

</script>
